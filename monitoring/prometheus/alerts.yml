groups:
  - name: ad_generator_alerts
    interval: 30s
    rules:
      # High latency alert
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(ad_generation_latency_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High API latency detected"
          description: "95th percentile latency is {{ $value }}s (threshold: 2s)"

      # Low quality score alert
      - alert: LowQualityScore
        expr: ad_quality_score < 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low ad quality score"
          description: "Quality score is {{ $value }} (threshold: 0.5)"

      # High error rate alert
      - alert: HighErrorRate
        expr: rate(requests_total{status="error"}[5m]) / rate(requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }} (threshold: 5%)"

      # Service down alert
      - alert: ServiceDown
        expr: up{job="ad-generator-api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "API service is down"
          description: "The ad-generator API has been down for more than 1 minute"
