name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Docker Build and Push"]
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.GKE_SA_KEY }}
        project_id: ${{ secrets.GKE_PROJECT_ID }}
        export_default_credentials: true
        
    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
          --zone ${{ secrets.GKE_ZONE }}
          
    - name: Update deployment image
      run: |
        kubectl set image deployment/ad-generator \
          ad-generator-api=${{ secrets.DOCKERHUB_USERNAME }}/ad-generator-api:latest \
          -n ad-generator
          
    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/ad-generator -n ad-generator --timeout=5m
        
    - name: Verify deployment
      run: |
        kubectl get pods -n ad-generator
        kubectl get svc -n ad-generator
        
    - name: Run smoke tests
      run: |
        # Get external IP
        EXTERNAL_IP=$(kubectl get svc ad-generator-service -n ad-generator -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        echo "Testing API at $EXTERNAL_IP"
        
        # Test health endpoint
        curl -f http://$EXTERNAL_IP/health || exit 1
        
        echo "✅ Deployment successful!"
