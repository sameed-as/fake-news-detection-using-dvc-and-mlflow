apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-generator-api
  namespace: ad-generator
  labels:
    app: ad-generator-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-generator-api
  template:
    metadata:
      labels:
        app: ad-generator-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/"
    spec:
      containers:
      - name: api
        image: nginx:alpine  # Using nginx as placeholder
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
