apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-generator-api
  namespace: ad-generator
  labels:
    app: ad-generator-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-generator-api
  template:
    metadata:
      labels:
        app: ad-generator-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api
        image: ad-generator-api:v1.0
        imagePullPolicy: Never  # LOCAL: Use local Docker image
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: MODEL_PATH
          value: "/app/models/ad-creative-generator"
        - name: MLFLOW_TRACKING_URI
          valueFrom:
            secretKeyRef:
              name: api-credentials
              key: mlflow-uri
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: log-level
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
