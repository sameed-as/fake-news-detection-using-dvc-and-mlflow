apiVersion: v1
kind: Service
metadata:
  name: ad-generator-api
  namespace: ad-generator
  labels:
    app: ad-generator-api
spec:
  type: NodePort  # LOCAL: Use NodePort instead of LoadBalancer
  selector:
    app: ad-generator-api
  ports:
  - port: 8000
    targetPort: 8000
    nodePort: 30080  # Fixed port for easy local access
    protocol: TCP
    name: http
