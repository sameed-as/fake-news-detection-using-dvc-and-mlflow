apiVersion: apps/v1
kind: Deployment
metadata:
  name: ad-generator
  namespace: ad-generator
  labels:
    app: ad-generator
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ad-generator
  template:
    metadata:
      labels:
        app: ad-generator
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: ad-generator-api
        image: YOUR_DOCKERHUB_USERNAME/ad-generator-api:latest  # Update this!
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: ad-generator-config
        - secretRef:
            name: ad-generator-secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
