apiVersion: v1
kind: Service
metadata:
  name: ad-generator-api
  namespace: ad-generator
  labels:
    app: ad-generator-api
spec:
  type: LoadBalancer  # Cloud: Gets external IP
  selector:
    app: ad-generator-api
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP
  sessionAffinity: None
